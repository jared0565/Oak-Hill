name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.100.0"
          command: d1 migrations apply oak-hill-bookings --remote
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          # Token needs Cloudflare Pages: Edit and D1: Edit permissions.
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler-action@v3 defaults to wrangler 3.90.0, which predates wrangler.jsonc
          # support and fails with "Must specify a directory of assets to deploy". Pin a
          # v4 wrangler so CI reads pages_build_output_dir and the D1 binding from config,
          # exactly like a local `wrangler pages deploy`.
          wranglerVersion: "4.100.0"
          # Config-driven: reads pages_build_output_dir and the D1 binding from wrangler.jsonc.
          command: pages deploy --commit-dirty=true
